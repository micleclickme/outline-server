name: Build and Push Multi-Arch Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/outline-server

jobs:
  build:
    name: Build (${{ matrix.target_arch }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - target_arch: x86_64
            platform: linux/amd64
          - target_arch: arm64
            platform: linux/arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install NPM Dependencies
        run: npm ci

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Docker image
        env:
          DOCKER_CONTENT_TRUST: 0
        run: |
          task shadowbox:docker:build \
            TARGET_ARCH=${{ matrix.target_arch }} \
            IMAGE_NAME=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.target_arch }} \
            IMAGE_VERSION=${{ steps.version.outputs.version }}

      - name: Push arch-specific image
        run: docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.target_arch }}

  manifest:
    name: Create Multi-Arch Manifest
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tags
        id: tags
        run: |
          TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            TAGS="${TAGS},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}"
          else
            TAGS="${TAGS},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${GITHUB_SHA::8}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Create and push multi-arch manifest
        run: |
          IFS=',' read -ra TAG_LIST <<< "${{ steps.tags.outputs.tags }}"
          for tag in "${TAG_LIST[@]}"; do
            docker buildx imagetools create \
              --tag "${tag}" \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:x86_64 \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:arm64
          done

      - name: Inspect manifest
        run: docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  cleanup:
    name: Delete old package versions
    runs-on: ubuntu-latest
    needs: manifest
    permissions:
      packages: write

    steps:
      - name: Delete untagged and old versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: outline-server
          package-type: container
          min-versions-to-keep: 5
          delete-only-untagged-versions: false
